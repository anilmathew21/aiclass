<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Content</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    max-width: 860px; margin: 0 auto; padding: 24px 20px;
    color: #222; line-height: 1.6; background: #fff;
  }
  document { display: block; }
  paragraph { display: block; margin: 0.6em 0; }
  heading { display: block; font-weight: 700; margin: 1.2em 0 0.4em; }
  heading[level="1"] { font-size: 1.6em; }
  heading[level="2"] { font-size: 1.3em; }
  heading[level="3"] { font-size: 1.1em; }
  list { display: block; padding-left: 1.6em; margin: 0.5em 0; }
  list[style="bullet"] { list-style-type: disc; }
  list[style="number"] { list-style-type: decimal; }
  list-item { display: list-item; margin: 0.25em 0; }
  code { background: #f3f3f3; padding: 1px 5px; border-radius: 3px;
          font-family: 'SF Mono', Menlo, monospace; font-size: .9em; }
  pre, snippet { display: block; background: #1e1e1e; color: #d4d4d4;
                  padding: 14px; border-radius: 6px; overflow-x: auto;
                  font-family: 'SF Mono', Menlo, monospace; font-size: .85em;
                  white-space: pre; margin: 0.8em 0; }
  figure { display: block; margin: 1em 0; text-align: center; }
  image { display: inline-block; max-width: 100%; }
  image:before { content: ""; }
  callout { display: block; background: #f0f4ff; border-left: 4px solid #6c47ff;
             padding: 12px 16px; border-radius: 0 6px 6px 0; margin: 0.8em 0; }
  math { display: block; font-style: italic; margin: 0.5em 0; color: #444; }
  table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
  table-row { display: table-row; }
  table-cell { display: table-cell; border: 1px solid #ddd; padding: 8px 10px; }
  bold { font-weight: 700; }
  italic { font-style: italic; }
  underline { text-decoration: underline; }
  link { color: #6c47ff; text-decoration: underline; cursor: pointer; }
  hr { border: none; border-top: 1px solid #eee; margin: 1.2em 0; }
</style>
</head>
<body>
<document version="2.0"><paragraph>1. <link href="http://pages.stat.wisc.edu/~ifischer/calculus.pdf">Calculus refresher</link> </paragraph><paragraph> Review pages 7 through 11 and pages 13 to 15.</paragraph><paragraph><bold>(If the above link doesn&#39;t work, please refer to the offline file provided below)</bold> </paragraph><file url="https://static.us.edusercontent.com/files/CcKUCotQoX7suNdc4U7laagA" filename="calculus.pdf"></file><paragraph>2. <link href="https://math.stackexchange.com/questions/1591520/what-is-difference-between-maxima-or-minima-and-global-maxima-or-minima">local vs global minima</link> </paragraph><paragraph></paragraph><paragraph></paragraph></document>
</body>
</html>
